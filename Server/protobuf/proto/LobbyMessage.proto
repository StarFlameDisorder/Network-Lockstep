syntax = "proto3";

package LobbyMessage;

//客户端->服务器
message LobbySyncRequest{
  string name=1;
  oneof content{
    PlayerJoinRoomRequest joinRoom=2;
    PlayerLeaveRoomRequest leaveRoom=3;
    PlayerStartRoomRequest startRoom=4;
    PlayerEndRoomRequest endRoom=5;
  }
}

message PlayerJoinRoomRequest{
  string name=1;
}

message PlayerLeaveRoomRequest{
  string name=1;
}

message PlayerStartRoomRequest{
  string name=1;
}

message PlayerEndRoomRequest{
  string name=1;
}

//服务器->客户端
message LobbySyncResponse{
  string name=1;
  oneof content{
    PlayerJoinRoomResponse joinRoom=2;
    PlayerLeaveRoomResponse leaveRoom=3;
    PlayerStartRoomResponse startRoom=4;
    PlayerEndRoomResponse endRoom=5;
  }
}

message PlayerJoinRoomResponse{
  string owner = 1;
  repeated string players=2;
}

message PlayerLeaveRoomResponse{
  string name=1;
}

message PlayerStartRoomResponse{
  string name=1;
}

message PlayerEndRoomResponse{
  string name=1;
}