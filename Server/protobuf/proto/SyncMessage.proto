syntax = "proto3";

import "ConnectMessage.proto";
import "GameMessage.proto";
import "LobbyMessage.proto";

package SyncMessage;

message ServerMessage{
    oneof content{
        string commonMessage = 2;
        ConnectMessage.ServerConnectMessage connectMessage = 3;
        GameMessage.GameSyncMessage gameSyncMessage = 4;
        LobbyMessage.LobbySyncResponse lobbySync = 5;
    }
}

message ClientMessage{
    uint64 clientId = 1;
    oneof content{
        string commonMessage = 2;
        ConnectMessage.ClientConnectMessage connectMessage = 3;
        GameMessage.GameSyncMessage gameSyncMessage = 4;
        LobbyMessage.LobbySyncRequest lobbySync=5;
        GameMessage.HeartBeat heartBeat=6;
    }
}
