syntax = "proto3";

package GameMessage;

import "UnityMath.proto";

message GameSyncMessage{
    uint64 roomId = 1;
    uint64 frameId=2;
    uint64 time=3;
    repeated PlayerSync players=4;
}

message GameSnapshotMessage{
    uint64 roomId = 1;
    uint64 frameId=2;
    uint64 time=3;
    repeated PlayerSnapshotSync playerSSs=4;
    repeated ObjectSnapshotSync objectSSs=5;
}


message PlayerSync
{
    uint64 playerId = 1;
    UnityMath.Vector3D inputMove= 2;
}

message PlayerSnapshotSync
{
    uint64 playerId=1;
    UnityMath.Vector3D pos = 2;
    UnityMath.Vector3D velocity= 3;
}

message ObjectSnapshotSync
{
    uint64 objectId=1;
    UnityMath.Vector3D pos = 2;
    UnityMath.Vector3D velocity= 3;
}