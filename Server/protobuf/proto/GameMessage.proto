syntax = "proto3";

package GameMessage;

import "UnityMath.proto";

message GameSyncMessage{
    uint64 frameId=1;
    uint64 time=2;
    repeated PlayerSync players=3;
}

message GameSnapshotMessage{
    oneof content{
        GameSnapshot snapshot=3;
        GameFrame frames=4;
    }
}

message GameSnapshot{
    uint64 frameId=1;
    uint64 lastFrameId=2;
    repeated PlayerSnapshotSync playerSSs=3;
    repeated ObjectSnapshotSync objectSSs=4;
}

message GameFrame{//只由服务器向客户端发送
    uint64 frameId=1;
    repeated PlayerSync players=2;
}

message PlayerSync
{
    uint64 frameId=1;
    uint64 time=2;
    string name=3;
    UnityMath.Vector3D inputMove= 4;
}

message PlayerSnapshotSync
{
    string name=1;
    uint64 frameId=2;

    UnityMath.Vector3D pos = 3;
    UnityMath.Vector3D velocity= 4;
}

message ObjectSnapshotSync
{
    uint64 objectId=1;
    UnityMath.Vector3D pos = 2;
    UnityMath.Vector3D velocity= 3;
}

message HeartBeat{
    string name=1;
    uint64 time=2;
}