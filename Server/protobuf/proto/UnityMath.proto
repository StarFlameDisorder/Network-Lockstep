syntax = "proto3";

package UnityMath;

/* ==================================================
  Unity 数据结构 采用int传输数据 需要使用时自己决定小数处理
================================================== */
message Vector2D {
  int32 x = 1;
  int32 y = 2;
}

message Vector3D {
  int32 x = 1;
  int32 y = 2;
  int32 z = 3;
}