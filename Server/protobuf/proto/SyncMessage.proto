syntax = "proto3";

import "ConnectMessage.proto";

package SyncMessage;

message ServerMessage{
    oneof content{
        string commonMessage = 2;
        ConnectMessage.ServerConnectMessage connectMessage = 3;
    }
}

message ClientMessage{
    uint64 clientId = 1;
    oneof content{
        string commonMessage = 2;
        ConnectMessage.ClientConnectMessage connectMessage = 3;
    }
}
