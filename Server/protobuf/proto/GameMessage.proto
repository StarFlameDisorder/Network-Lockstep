syntax = "proto3";

package GameMessage;

import "UnityMath.proto";

message GameSyncMessage{
    uint64 frameId=1;
    uint64 time=2;
    repeated PlayerSync players=3;
}

message GameSnapshotMessage{
    uint64 frameId=1;
    uint64 time=2;
    repeated PlayerSnapshotSync playerSSs=3;
    repeated ObjectSnapshotSync objectSSs=4;
}

message PlayerSync
{
    uint64 frameId=1;
    uint64 time=2;
    string name=3;
    UnityMath.Vector3D inputMove= 4;
}

message PlayerSnapshotSync
{
    string name=1;
    UnityMath.Vector3D pos = 2;
    UnityMath.Vector3D velocity= 3;
}

message ObjectSnapshotSync
{
    uint64 objectId=1;
    UnityMath.Vector3D pos = 2;
    UnityMath.Vector3D velocity= 3;
}

message HeartBeat{
    string name=1;
    uint64 time=2;
}